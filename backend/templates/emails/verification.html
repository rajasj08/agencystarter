<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email</title>
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; color: #111827; background-color: #f8fafc; padding: 24px;">
  <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 8px; border: 1px solid #e5e7eb; padding: 32px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
    <h1 style="margin: 0 0 8px; font-size: 20px; font-weight: 600;">Verify your email</h1>
    <p style="margin: 0 0 24px; color: #6b7280; font-size: 14px;">Hi {{userName}},</p>
    <p style="margin: 0 0 24px;">Thanks for signing up for {{appName}}. Click the button below to verify your email address.</p>
    <p style="margin: 0 0 24px;">
      <a href="{{verificationLink}}" style="display: inline-block; background: #3b82f6; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: 500;">Verify email</a>
    </p>
    <p style="margin: 0; font-size: 13px; color: #6b7280;">If you didn’t create an account, you can ignore this email.</p>
    <p style="margin: 24px 0 0; font-size: 12px; color: #9ca3af;">— {{appName}}</p>
  </div>
</body>
</html>
